<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOGIRI_DAJARE_ENGINE</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">

    <!-- Header -->
    <header>
        <div class="header-line">OOGIRI_DAJARE_ENGINE v2.0 | New_oogiri_arg protocol</div>
        <h1>大喜利ダジャレ生成装置</h1>
        <div class="subtitle">// 母音解析アルゴリズムによるダジャレ回答生成パイプライン</div>
    </header>

    <!-- Input -->
    <div class="input-section">
        <div class="prompt-label">odai.input</div>
        <div class="input-row">
            <textarea id="odai" rows="2" placeholder="お題を入力 or 下のボタンで取得..."></textarea>
        </div>
        <div class="btn-row">
            <button class="btn btn-exec" id="gen-btn" onclick="run()">EXECUTE</button>
            <button class="btn btn-fetch" onclick="fetchOdai()">FETCH_ODAI</button>
        </div>

        <!-- Odai list -->
        <div id="odai-panel" class="odai-panel hidden">
            <div class="odai-panel-header">oogiri.app/realtime - page <span id="page-num">1</span></div>
            <div id="odai-items"></div>
            <div class="odai-nav">
                <button class="btn btn-sm" id="prev-btn" onclick="nav(-1)" disabled>&lt; prev</button>
                <button class="btn btn-sm" onclick="nav(1)">next &gt;</button>
            </div>
        </div>
    </div>

    <!-- Log -->
    <div id="log-section" class="log-section hidden">
        <div class="log-header">
            <span>PIPELINE_LOG</span>
            <span id="log-status" class="cursor"></span>
        </div>
        <div class="log-body" id="log-body"></div>
    </div>

    <!-- Results -->
    <div id="results" class="results-section hidden">
        <div class="results-header">OUTPUT // GENERATED_ANSWERS</div>
        <div id="answers"></div>
    </div>

    <!-- Error -->
    <div id="error" class="error-box hidden"></div>

    <footer>
        <a href="/algorithm">algorithm.doc</a> | powered by New_oogiri_arg + Claude API
    </footer>

</div>

<script>
let page = 1;

// ── Fetch Odai ──
async function fetchOdai() {
    const panel = document.getElementById('odai-panel');
    const items = document.getElementById('odai-items');
    panel.classList.remove('hidden');
    items.innerHTML = '<div style="padding:0.5rem;color:var(--amber)">fetching...</div>';
    document.getElementById('page-num').textContent = page;

    try {
        const r = await fetch('/fetch-odai?page=' + page);
        const d = await r.json();
        if (d.error) { items.innerHTML = '<div style="padding:0.5rem;color:var(--red)">' + esc(d.error) + '</div>'; return; }

        items.innerHTML = '';
        (d.odai_list || []).forEach((o, i) => {
            const el = document.createElement('div');
            el.className = 'odai-item';
            el.innerHTML = '<span class="num">[' + String(i+1).padStart(2,'0') + ']</span>' + esc(o.text);
            el.onclick = () => {
                document.getElementById('odai').value = o.text;
                document.querySelectorAll('.odai-item').forEach(x => x.classList.remove('selected'));
                el.classList.add('selected');
            };
            items.appendChild(el);
        });
    } catch(e) {
        items.innerHTML = '<div style="padding:0.5rem;color:var(--red)">connection error: ' + esc(e.message) + '</div>';
    }

    document.getElementById('prev-btn').disabled = (page <= 1);
}

function nav(d) { page = Math.max(1, page + d); fetchOdai(); }

// ── Run Pipeline (SSE) ──
function run() {
    const odai = document.getElementById('odai').value.trim();
    if (!odai) return;

    const btn = document.getElementById('gen-btn');
    const logSec = document.getElementById('log-section');
    const logBody = document.getElementById('log-body');
    const logStatus = document.getElementById('log-status');
    const results = document.getElementById('results');
    const errorBox = document.getElementById('error');

    btn.disabled = true;
    btn.textContent = 'RUNNING...';
    logSec.classList.remove('hidden');
    logBody.innerHTML = '';
    results.classList.add('hidden');
    errorBox.classList.add('hidden');
    logStatus.textContent = 'running';
    logStatus.classList.add('cursor');

    addLog('info', 'pipeline.start("' + odai + '")');

    const src = new EventSource('/generate-stream?odai=' + encodeURIComponent(odai));

    src.onmessage = function(ev) {
        const msg = JSON.parse(ev.data);
        handleMsg(msg);
        if (msg.status === 'complete' || (msg.status === 'error' && msg.step === -1)) {
            src.close();
            btn.disabled = false;
            btn.textContent = 'EXECUTE';
            logStatus.textContent = msg.status === 'complete' ? 'done' : 'error';
            logStatus.classList.remove('cursor');
            if (msg.status === 'complete') addLog('done', 'pipeline.complete()');
            if (msg.step === -1) { errorBox.textContent = msg.data.message; errorBox.classList.remove('hidden'); }
        }
    };

    src.onerror = function() {
        src.close();
        btn.disabled = false;
        btn.textContent = 'EXECUTE';
        logStatus.textContent = 'error';
        logStatus.classList.remove('cursor');
        addLog('error', 'connection lost - APIキーが設定されているか確認してください');
    };
}

const STEP_NAMES = {1:'parse_odai', 2:'generate_clusters', 3:'vowel_analysis', 5:'generate_answers'};

function handleMsg(msg) {
    const name = STEP_NAMES[msg.step] || ('step_' + msg.step);

    if (msg.status === 'processing') {
        addLog('processing', name + '() ... ' + (msg.data.message || ''));
    }

    if (msg.status === 'done') {
        addLog('done', name + '() -> OK');
        const d = msg.data;

        if (msg.step === 1) {
            addDetail('subject: "' + (d.subject||'') + '"  modifiers: [' + (d.modifiers||[]).join(', ') + ']');
        }

        if (msg.step === 2) {
            const ss = (d.subject_samples||[]).map(w => w.text+'('+w.score+')').join(', ');
            const ms = (d.modifier_samples||[]).map(w => w.text+'('+w.score+')').join(', ');
            addDetail('sub_cluster[' + d.subject_cluster_size + ']: ' + ss + ' ...');
            addDetail('mod_cluster[' + d.modifier_cluster_size + ']: ' + ms + ' ...');
        }

        if (msg.step === 3) {
            addDetail('combinations: ' + d.total_combinations + '  dajare_eggs: ' + d.dajare_eggs_count);
            (d.top_combinations||[]).slice(0,5).forEach((c,i) => {
                addDetail('#' + c.rank + ' ' + c.subject_word + ' + ' + c.modifier_word + '  match:' + c.vowel_match_rate + '%  [' + c.technique + ']');
            });
        }

        if (msg.step === 5) {
            showResults(d.answers || []);
        }
    }
}

function showResults(answers) {
    const el = document.getElementById('answers');
    el.innerHTML = '';
    answers.forEach((a, i) => {
        el.innerHTML += '<div class="answer-item">'
            + '<div class="answer-text"><span class="answer-num">[' + (i+1) + ']</span> ' + esc(a.answer) + '</div>'
            + '<div class="answer-meta">'
            + '<span class="tag">' + esc(a.technique||'') + '</span>'
            + '<span>' + esc(a.dajare_words||'') + '</span>'
            + '<span>' + esc(a.explanation||'') + '</span>'
            + '</div></div>';
    });
    document.getElementById('results').classList.remove('hidden');
}

function addLog(cls, text) {
    const b = document.getElementById('log-body');
    const ts = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    b.innerHTML += '<div class="log-line ' + cls + '"><span class="ts">' + ts + '</span>' + esc(text) + '</div>';
    b.scrollTop = b.scrollHeight;
}

function addDetail(text) {
    const b = document.getElementById('log-body');
    b.innerHTML += '<div class="log-detail">' + esc(text) + '</div>';
    b.scrollTop = b.scrollHeight;
}

function esc(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

document.getElementById('odai').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); run(); }
});
</script>
</body>
</html>
